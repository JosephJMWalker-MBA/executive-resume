name: Verify Professional Publisher

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Verify tests and generated web surfaces
        run: npm run verify

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Render PDF
        run: npm run render

      - name: Verify PDF artifact exists
        run: test -n "$(find dist -maxdepth 1 -name '*.pdf' -print -quit)"

      - name: Upload generated publisher artifacts
        uses: actions/upload-artifact@v4
        with:
          name: professional-provenance-publisher
          path: |
            index.html
            links/index.html
            portfolio/index.html
            dist/*.pdf
